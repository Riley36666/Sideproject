<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    /* Add any additional styling here if necessary */
    .notion-style-editor {
      border: 1px solid #ddd;
      padding: 15px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      min-height: 400px;
      overflow-y: auto;
    }
    .page-card {
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    #page-editor {
      display: none;
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <h2>Dashboard</h2>
    <p id="user-info" style="margin: 10px 0; font-size: 1em;"></p>
    <button class="add-page-btn" id="add-page-btn" style="background: #007bff; color: white; border-radius: 20px; padding: 10px; border: none; cursor: pointer;">+ Add New Page</button>
    <button class="admin-btn" id="admin-btn" style="display: none;">View Users</button>
    <button id="settings-btn">Settings</button>
    <button class="logout-btn" id="logout-btn" style="background: #007bff; color: white; border-radius: 20px; padding: 10px; border: none; cursor: pointer;">Logout</button>
  </div>

  <!-- Full-page editor section -->
  <div class="main-content">
    <div id="page-editor" class="page-editor" style="display: none;">
      <button id="back-to-list-btn" style="background: #ddd; padding: 8px; border-radius: 5px; cursor: pointer;">Back to Pages</button>
      <div id="editor" contenteditable="true" class="notion-style-editor" style="min-height: 400px; margin-top: 20px;"></div>
    </div>

    <div id="page-list" class="page-list" style="display: block;">
      <h1>Manage Pages</h1>
      <!-- Page cards will be dynamically inserted here -->
    </div>
  </div>

  <!-- Content Modal -->
  <!-- Content Modal -->
<div id="contentModal" class="modal">
  <div class="modal-content">
    <h3>Edit Page</h3>
    <label>Title:</label>
    <input type="text" id="title-input" />

    <label>Content:</label>
    <textarea id="content-display"></textarea>

    <div class="modal-buttons">
      <button id="save-content-btn" style="background: var(--edit-button-background); color: #fff; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer;">Save</button>
      <button id="close-content-btn" style="background: var(--close-button-background); color: #fff; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer;">Close</button>
    </div>
  </div>
</div>


  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <h3>Settings</h3>
      <div>
        <label for="dark-mode-toggle">Dark Mode:</label>
        <input type="checkbox" id="dark-mode-toggle">
      </div>
      <div style="text-align: right;">
        <button class="close-btn" id="close-settings-btn" style="background: #ff3b3f; color: white; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer;">Close</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
